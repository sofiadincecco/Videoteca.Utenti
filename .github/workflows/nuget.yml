# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: NuGet
on:
  push:
    tags: [ "v*" ]
env:
  NUGET_USERNAME: ${{ secrets.NUGET_USERNAME }}
  NUGET_PASSWORD: ${{ secrets.NUGET_PASSWORD }}
jobs:
  publish_nuget:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v2
      with:
        dotnet-version: 9.0.x
    - name: Restore dependencies
      run: dotnet restore "Videoteca.Utenti.sln"
    - name: Build Release
      run: dotnet build --configuration Release --no-restore "Videoteca.Utenti.sln"
    - name: Pack Shared
      run: dotnet pack --no-restore --configuration Release "Videoteca.Utenti.Shared/Videoteca.Utenti.Shared.csproj"
    - name: Pack ClientHttp
      run: dotnet pack --no-restore --configuration Release "Videoteca.Utenti.ClientHttp/Videoteca.Utenti.ClientHttp.csproj"
    - name: Push
      run: dotnet nuget push "*/bin/Release/*.nupkg" --source "https://nuget.pkg.github.com/sofiadincecco/index.json" --skip-duplicate --api-key ${{ secrets.GITHUB_TOKEN }}
